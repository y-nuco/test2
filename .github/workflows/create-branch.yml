name: Auto Create and Link Branch

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Create and Link Branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueId = context.payload.issue.node_id;
            const issueNumber = context.payload.issue.number;
            const repositoryId = context.payload.repository.node_id;
            
            const issueTitle = context.payload.issue.title
              .toLowerCase()
              .replace(/\s+/g, '-')
              .replace(/[^a-z0-9-]/g, '');
            
            const branchName = `feature/${issueNumber}-${issueTitle || 'task'}`;

            try {
              // 1. デフォルトブランチ（main）の最新のSHA（OID）を取得
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
              });
              const latestSha = ref.object.sha;

              // 2. 新しいブランチを作成
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: latestSha,
              });

              // 3. Issueとブランチを紐付ける
              const query = `mutation CreateLinkedBranch($issueId: ID!, $branchName: String!, $repositoryId: ID!, $oid: GitObjectID!) {
                createLinkedBranch(input: {
                  issueId: $issueId
                  name: $branchName
                  repositoryId: $repositoryId
                  oid: $oid
                }) {
                  linkedBranch {
                    id
                    ref {
                      name
                    }
                  }
                }
              }`;

              const variables = {
                issueId: issueId,
                branchName: branchName,
                repositoryId: repositoryId,
                oid: latestSha
              };

              const result = await github.graphql(query, variables);
              console.log("Linked branch result:", result);
              console.log(`Successfully created and linked branch: ${branchName}`);

            } catch (error) {
              console.error("Error details:", error);
              console.error("Error message:", error.message);
              if (error.status === 422) {
                console.log("Branch already exists or invalid name.");
              } else {
                throw error;
              }
            }
