name: Auto Create and Link Branch

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and Link Branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title
              .toLowerCase()
              .replace(/\s+/g, '-')
              .replace(/[^a-z0-9-]/g, '');
            
            const branchName = `feature/${issueNumber}-${issueTitle || 'task'}`;

            try {
              // 1. デフォルトブランチの最新SHAを取得
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
              });
              const latestSha = ref.object.sha;

              // 2. 新しいブランチを作成
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: latestSha,
              });

              // 3. ドラフト PR を自動作成（Development に表示させるため）
              const prResult = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `WIP: ${context.payload.issue.title}`,
                head: branchName,
                base: 'main',
                draft: true, // ドラフト PR として作成
                body: `Closes #${issueNumber}`
              });

              console.log(`Successfully created branch: ${branchName}`);
              console.log(`Draft PR created: #${prResult.data.number}`);

            } catch (error) {
              console.error("Error:", error.message);
              throw error;
            }
