name: Auto Create and Link Branch

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write # 追加
  id-token: write      # 追加

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Create and Link Branch
        uses: actions/github-script@v6
        with:
          script: |
            const issueId = context.payload.issue.node_id;
            const issueNumber = context.payload.issue.number;
            const repositoryId = context.payload.repository.node_id;
            
            const issueTitle = context.payload.issue.title
              .toLowerCase()
              .replace(/\s+/g, '-')
              .replace(/[^a-z0-9-]/g, '');
            
            const branchName = `feature/${issueNumber}-${issueTitle || 'task'}`;

            try {
              // 1. デフォルトブランチ（main）の最新のSHA（OID）を取得
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
              });
              const latestSha = ref.object.sha;

              // 2. 新しいブランチを作成
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: latestSha,
              });

              // 3. Issueとブランチを紐付ける (oidを追加して修正)
              const query = `mutation($issueId: ID!, $branchName: String!, $repositoryId: ID!, $oid: GitObjectID!) {
                createLinkedBranch(input: {
                  issueId: $issueId, 
                  name: $branchName, 
                  repositoryId: $repositoryId,
                  oid: $oid
                }) {
                  clientMutationId
                }
              }`;

              const variables = {
                issueId: issueId,
                branchName: branchName,
                repositoryId: repositoryId,
                oid: latestSha // ここで取得した最新のSHAを渡す
              };

              await github.graphql(query, variables);

              console.log(`Successfully created and linked branch: ${branchName}`);
            } catch (error) {
              console.error("Error details:", error);
              if (error.status === 422) {
                console.log("Branch already exists or invalid name.");
              } else {
                throw error;
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ ブランチを作成し、このIssueと紐付けました！\n\n**Branch:** \`${branchName}\` \n\n次のコマンドで開発を開始できます：\n\`\`\`bash\ngit fetch origin && git checkout ${branchName}\n\`\`\``
            });
