name: Auto Create Branch

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Create and Link Branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title
              .toLowerCase()
              .replace(/\s+/g, '-')
              .replace(/[^a-z0-9-]/g, '');
            
            const branchName = `feature/${issueNumber}-${issueTitle || 'task'}`;
            const issueId = context.payload.issue.node_id;
            const repositoryId = context.payload.repository.node_id;

            try {
              // 1. デフォルトブランチの最新SHAを取得
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
              });
              const latestSha = ref.object.sha;

              // 2. 新しいブランチを作成
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: latestSha,
              });

              // ブランチが API に反映されるまで待機
              await new Promise(resolve => setTimeout(resolve, 2000));

              // 3. GraphQL で Issue とブランチをリンク
              const query = `
                mutation LinkBranch($issueId: ID!, $branchName: String!, $repositoryId: ID!, $oid: GitObjectID!) {
                  createLinkedBranch(input: {
                    issueId: $issueId
                    name: $branchName
                    repositoryId: $repositoryId
                    oid: $oid
                  }) {
                    linkedBranch {
                      id
                    }
                  }
                }
              `;

              const result = await github.graphql(query, {
                issueId: issueId,
                branchName: branchName,
                repositoryId: repositoryId,
                oid: latestSha
              });

              console.log(`Successfully linked branch: ${branchName}`);
              console.log(JSON.stringify(result, null, 2));

            } catch (error) {
              console.error("Error:", error.message);
              if (error.message.includes('NOT_FOUND')) {
                console.log("ブランチがまだ API に反映されていない可能性があります");
              }
              throw error;
            }
