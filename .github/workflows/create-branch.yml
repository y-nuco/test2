name: Auto Create Branch and Draft PR

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Branch and Draft PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title
              .toLowerCase()
              .replace(/\s+/g, '-')
              .replace(/[^a-z0-9-]/g, '');
            
            const branchName = `feature/${issueNumber}-${issueTitle || 'task'}`;

            try {
              // 1. デフォルトブランチの最新SHAを取得
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
              });
              const latestSha = ref.object.sha;

              // 2. 新しいブランチを作成
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: latestSha,
              });

              // 3. .gitkeep ファイルをコミット（差分を作る）
              const blob = await github.rest.git.createBlob({
                owner: context.repo.owner,
                repo: context.repo.repo,
                content: '',
                encoding: 'utf-8',
              });

              const tree = await github.rest.git.createTree({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base_tree: latestSha,
                tree: [
                  {
                    path: `.issues/${issueNumber}/.gitkeep`,
                    mode: '100644',
                    type: 'blob',
                    sha: blob.data.sha,
                  }
                ],
              });

              const commit = await github.rest.git.createCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                message: `[Issue #${issueNumber}] Initialize branch`,
                tree: tree.data.sha,
                parents: [latestSha],
              });

              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`,
                sha: commit.data.sha,
              });

              // 4. Draft PR を自動作成
              const prResult = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[#${issueNumber}] ${context.payload.issue.title}`,
                head: branchName,
                base: 'main',
                draft: true,
                body: `Closes #${issueNumber}`
              });

              console.log(`✅ Branch created: ${branchName}`);
              console.log(`✅ Draft PR created: #${prResult.data.number}`);

            } catch (error) {
              console.error("Error:", error.message);
              throw error;
            }
