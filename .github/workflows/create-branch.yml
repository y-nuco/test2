name: Auto Create and Link Branch

on:
  issues:
    types: [opened]

# Actionsにブランチ作成とIssue操作の権限を与える
permissions:
  contents: write
  issues: write

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Create and Link Branch
        uses: actions/github-script@v6
        with:
          script: |
            const issueId = context.payload.issue.node_id;
            const issueNumber = context.payload.issue.number;
            const repositoryId = context.payload.repository.node_id;
            
            // ブランチ名の規則（ここを自由に変えられます）
            // 例：feature/1-title-name
            const issueTitle = context.payload.issue.title
              .toLowerCase()
              .replace(/\s+/g, '-')
              .replace(/[^a-z0-9-]/g, '');
            
            const branchName = `feature/${issueNumber}-${issueTitle || 'task'}`;

            try {
              // 1. デフォルトブランチ（main）の最新のSHA（地点）を取得
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main', // メインブランチがmasterならここを変更
              });

              // 2. 新しいブランチを作成
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: ref.object.sha,
              });

              // 3. Issueとブランチを紐付ける (Developmentセクションに表示させる)
              const query = `mutation($issueId: ID!, $branchName: String!, $repositoryId: ID!) {
                createLinkedBranch(input: {
                  issueId: $issueId, 
                  name: $branchName, 
                  repositoryId: $repositoryId
                }) {
                  clientMutationId
                }
              }`;

              const variables = {
                issueId: issueId,
                branchName: branchName,
                repositoryId: repositoryId
              };

              await github.graphql(query, variables);

              console.log(`Successfully created and linked branch: ${branchName}`);
            } catch (error) {
              console.error("Error details:", error);
              // すでにブランチが存在する場合などのエラーハンドリング
              if (error.status === 422) {
                console.log("Branch already exists or invalid name.");
              } else {
                throw error;
              }
            }
